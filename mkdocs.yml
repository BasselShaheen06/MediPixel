site_name: MediPixel
site_description: Medical image processing workstation — noise, denoising, contrast, SNR/CNR
site_author: Bassel Shaheen
site_url: https://basselshaheen06.github.io/MediPixel
repo_url: https://github.com/BasselShaheen06/MediPixel
repo_name: BasselShaheen06/MediPixel

copyright: >
  MIT License &nbsp;·&nbsp; Bassel Shaheen, Cairo University SBME &nbsp;·&nbsp;
  <a href="mailto:bassel.abdelmonem06@eng-st.cu.edu.eg" class="footer-contact">
    ✉ bassel.abdelmonem06@eng-st.cu.edu.eg
  </a>

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - The Science: science.md
  - API Reference:
      - core/noise.py: api/noise.md
      - core/denoiser.py: api/denoiser.md
      - core/contrast.py: api/contrast.md
  - Roadmap: roadmap.md
  - Changelog: changelog.md
  - Contributing: contributing.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BasselShaheen06
      name: BasselShaheen06 on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/basselshaheen06/
      name: Bassel Shaheen on LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:bassel.abdelmonem06@eng-st.cu.edu.eg
      name: Email Bassel